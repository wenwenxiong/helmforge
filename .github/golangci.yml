run:
  # 并发性
  timeout: 10m
  tests: true
  skip-dirs:
    - third-party
    - vendor
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
    - ".*\\.mock\\.go$"

# 输出配置
output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true

# Linters 配置
linters:
  disable-all: true
  enable:
    # 性能和安全性
    - govet
    - gosec
    - ineffassign
    - prealloc

    # 代码质量
    - errcheck
    - staticcheck
    - gosimple
    - unused
    - revive
    - dupl
    - gocyclo
    - goconst
    - gofmt
    - goimports
    - misspell
    - gocritic
    - gocognit

    # 代码风格
    - gci
    - stylecheck
    - unconvert
    - unparam
    - nakedret
    - predeclared
    - exportloopref
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
    - nilerr
    - forbidigo
    - tagliatelle
    - wastedassign
    - whitespace
    - wsl

    # 复杂度
    - funlen
    - gocognit
    - cyclop
    - maintidx

  # 禁用的 linters
  disable:
    - exhaustivestruct  # 对于外部包过于严格
    - godox           # 允许 TODO 注释
    - varnamelen       # 变量名长度限制过于严格
    - lll             # 行长度限制，代码审查时手动检查
    - nlreturn        # 新行返回规则

# Linters 配置详情
linters-settings:
  # 性能优化
  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  ineffassign:
    detect-all: true

  # 安全性检查
  gosec:
    excludes:
      - G104 # 错误检查在其他地方处理

  # 代码风格
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/wenwenxiong/HelmForge)
    skip-generated: true

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint # 过于严格
      - unnamedResult # 允许无名返回值

  goconst:
    min-len: 3
    min-occurrences: 3
    test-files: false

  gofmt:
    simplify: true

  misspell:
    locale: US
    ignore-words:
      - someword

  forbidigo:
    forbid:
      - reflect.DeepEqual
      - fmt.Print

  # 复杂度限制
  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20

  cyclop:
    max-complexity: 20
    package-average: 10.0
    skip-tests: false

  funlen:
    lines: 50
    statements: 30

  # 错误处理
  errcheck:
    check-type-assertions: true
    check-blank: false
    exclude-functions:
      - (io.Closer).Close
      - (*net/http.Client).Do

  # 代码质量
  revive:
    confidence: 0.8
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
      - name: blank-imports
        severity: error
      - name: context-as-argument
        severity: error
      - name: context-keys-type
        severity: error
      - name: dot-imports
        severity: error
      - name: error-return
        severity: error
      - name: error-strings
        severity: error
      - name: error-naming
        severity: error
      - name: if-return
        severity: error
      - name: increment-decrement
        severity: error
      - name: var-declaration
        severity: error
      - name: package-comments
        severity: warning
      - name: range
        severity: error
      - name: receiver-naming
        severity: error
      - name: time-naming
        severity: error
      - name: unexported-return
        severity: error
      - name: indent-error-flow
        severity: error
      - name: errorf
        severity: error

  # 静态分析
  staticcheck:
    checks: [ "all" ]

  stylecheck:
    checks: [ "all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022" ]

# 问题配置
issues:
  # 排除特定的规则
  exclude-rules:
    - # 允许在测试中使用 TODO
      - path: _test\.go
        linters:
          - godox

    - # 允许测试中包含 fmt.Println
      - path: _test\.go
        text: "fmt.Print"

    - # 允许错误检查在特定位置
      - path: pkg/kompose/
        linters:
          - errcheck
          - gosec

    - # 第三方代码不检查
      - path: third-party/
        text: ".*"

  # 显示所有问题，包括新出现的
  new: false

  # 将所有问题都显示出来，不限制数量
  max-issues-per-linter: 0
  max-same-issues: 0

# 严重性配置
severity:
  default-severity: error
  case-sensitive: false