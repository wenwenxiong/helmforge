# Default values for helmforge
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: helmforge
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env:
  DOCKER_HOST: unix:///var/run/docker.sock
  HELM_HOME: /app/.helm

# Volumes
volumes:
  - name: docker-sock
    hostPath:
      path: /var/run/docker.sock

volumeMounts:
  - name: docker-sock
    mountPath: /var/run/docker.sock
